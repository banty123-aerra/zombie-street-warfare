<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Racer: Neon Drift</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 30px; left: 30px; color: #00f0ff; pointer-events: none; z-index: 10; }
        .stat-card { background: rgba(0, 5, 20, 0.9); padding: 15px 25px; border-left: 4px solid #ff0055; margin-bottom: 15px; border-radius: 0 15px 15px 0; box-shadow: 0 0 20px rgba(0, 240, 255, 0.2); }
        #speed-unit { position: absolute; bottom: 40px; right: 40px; color: #00f0ff; font-size: 2.5em; font-weight: 900; text-shadow: 0 0 15px #00f0ff; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff0055; display: flex; justify-content: center; align-items: center; z-index: 100; font-size: 2em; letter-spacing: 5px; }
    </style>
</head>
<body>

<div id="loading">IGNITING ENGINE...</div>

<div id="ui">
    <div class="stat-card">RANK: ELITE PILOT</div>
    <div class="stat-card">SCORE: <span id="score">0</span></div>
    <div class="stat-card" id="location">📍 GPS: CALIBRATING...</div>
</div>

<div id="speed-unit"><span id="speed">0</span> <small style="font-size: 0.4em;">KM/H</small></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.025);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Dynamic Lights
    const pLight = new THREE.PointLight(0xff0055, 2, 20);
    scene.add(pLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    // --- REALISTIC ROAD ---
    const roadGroup = new THREE.Group();
    const roadGeo = new THREE.PlaneGeometry(18, 2000);
    const roadMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.1 });
    const road = new THREE.Mesh(roadGeo, roadMat);
    road.rotation.x = -Math.PI / 2;
    roadGroup.add(road);

    // Neon Strips
    for(let i = -9; i <= 9; i += 18) {
        const strip = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2000), new THREE.MeshBasicMaterial({ color: 0x00f0ff }));
        strip.position.set(i, 0.05, 0);
        strip.rotation.x = -Math.PI / 2;
        roadGroup.add(strip);
    }
    scene.add(roadGroup);

    // --- DETAILED 3D SPORTS CAR ---
    const car = new THREE.Group();
    // Chassis
    const base = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.4, 3), new THREE.MeshStandardMaterial({ color: 0xff0055, metalness: 0.8, roughness: 0.2 }));
    base.position.y = 0.4;
    // Glass Cockpit
    const glass = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.5, 1.3), new THREE.MeshStandardMaterial({ color: 0x000000, transparent: true, opacity: 0.7 }));
    glass.position.set(0, 0.8, -0.2);
    // Spoiler
    const spoiler = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.1, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
    spoiler.position.set(0, 0.9, 1.2);
    
    car.add(base, glass, spoiler);
    scene.add(car);

    // Obstacles (Traffic)
    const obstacles = [];
    function spawnObstacle() {
        const type = Math.random() > 0.5 ? 0x555555 : 0x00ffcc;
        const obs = new THREE.Mesh(new THREE.BoxGeometry(2, 1.2, 3), new THREE.MeshStandardMaterial({ color: type }));
        obs.position.set((Math.random() - 0.5) * 14, 0.6, -150);
        scene.add(obs);
        obstacles.push(obs);
    }

    const keys = {};
    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()]
