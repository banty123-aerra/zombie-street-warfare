<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Cyber Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f0ff; pointer-events: none; z-index: 10; }
        .stat-card { background: rgba(0, 10, 30, 0.85); padding: 12px 20px; border-left: 4px solid #ff0055; margin-bottom: 10px; border-radius: 0 10px 10px 0; }
        #speed-unit { position: absolute; bottom: 30px; right: 30px; color: #00f0ff; font-size: 2em; font-weight: bold; text-shadow: 0 0 10px #00f0ff; }
        /* Loading screen ని తీసేసి డైరెక్ట్ గా గేమ్ వచ్చేలా చేశాను */
    </style>
</head>
<body>

<div id="ui">
    <div class="stat-card">RANK: ELITE PILOT</div>
    <div class="stat-card">SCORE: <span id="score">0</span></div>
    <div class="stat-card" id="location">📍 GPS: ONLINE</div>
</div>

<div id="speed-unit"><span id="speed">0</span> KM/H</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.02);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Basic Light
    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    const dLight = new THREE.DirectionalLight(0xff0055, 1);
    dLight.position.set(0, 10, 5);
    scene.add(dLight);

    // --- ROAD ---
    const roadGroup = new THREE.Group();
    const road = new THREE.Mesh(new THREE.PlaneGeometry(16, 2000), new THREE.MeshPhongMaterial({ color: 0x0a0a0a }));
    road.rotation.x = -Math.PI / 2;
    roadGroup.add(road);

    // Neon Lines
    const lineL = new THREE.Mesh(new THREE.PlaneGeometry(0.3, 2000), new THREE.MeshBasicMaterial({ color: 0x00f0ff }));
    lineL.position.set(-8, 0.02, 0);
    lineL.rotation.x = -Math.PI / 2;
    roadGroup.add(lineL);
    const lineR = lineL.clone(); lineR.position.x = 8;
    roadGroup.add(lineR);
    scene.add(roadGroup);

    // --- NEW STYLISH 3D CAR ---
    const car = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 3), new THREE.MeshPhongMaterial({ color: 0xff0055 }));
    body.position.y = 0.4;
    const top = new THREE.Mesh(new THREE.BoxGeometry(1, 0.4, 1.2), new THREE.MeshPhongMaterial({ color: 0x111111 }));
    top.position.set(0, 0.8, -0.2);
    const wing = new THREE.Mesh(new THREE.BoxGeometry(1.6, 0.1, 0.4), new THREE.MeshPhongMaterial({ color: 0x000000 }));
    wing.position.set(0, 0.9, 1.3);
    car.add(body, top, wing);
    scene.add(car);

    // Obstacles
    const obstacles = [];
    function spawn() {
        const obs = new THREE.Mesh(new THREE.BoxGeometry(2.2, 1.5, 3), new THREE.MeshPhongMaterial({ color: 0x333333 }));
        obs.position.set((Math.random() - 0.5) * 12, 0.75, -150);
        scene.add(obs);
        obstacles.push(obs);
    }

    const keys = {};
    window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
    window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

    let score = 0, frame = 0;

    function animate() {
        requestAnimationFrame(animate);
        frame++;

        // Controls with TILT
        if (keys['a'] && car.position.x > -6.5) {
            car.position.x -= 0.25;
            car.rotation.z = 0.15;
        } else if (keys['d'] && car.position.x < 6.5) {
            car.position.x += 0.25;
            car.rotation.z = -0.15;
        } else {
            car.rotation.z = 0;
        }

        document.getElementById('speed').innerText = 180 + Math.floor(score/5);

        // Infinite Road
        roadGroup.position.z += 2;
        if (roadGroup.position.z > 100) roadGroup.position.z = 0;

        if (frame % 45 === 0) spawn();

        obstacles.forEach((obs, i) => {
            obs.position.z += 2.2;
            if (obs.position.distanceTo(car.position) < 2.5) {
                location.reload(); 
            }
            if (obs.position.z > 20) {
                scene.remove(obs);
                obstacles.splice(i, 1);
                score += 10;
                document.getElementById('score').innerText = score;
            }
        });

        camera.position.set(car.position.x * 0.5, 4.5, car.position.z + 10);
